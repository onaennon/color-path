/* ══════════════════════════════════════════════════════════════
   COLOR PATH  ·  Girl Punk Graph Puzzle

   GENERATION
   ───────────
   Sequential BFS per colour pair:
   1. Pick 2 free nodes (not occupied, min distance apart)
   2. BFS shortest path avoiding all occupied nodes/edges
   3. Mark entire path (nodes + edges) as occupied
   4. If BFS fails → repick endpoints (up to 100 attempts)
   5. If pair still fails → restart whole level (up to 30 tries)

   PLAYER INTERACTION
   ───────────────────
   • Drag along graph edges node-by-node
   • Each node/edge entered becomes occupied by that colour
   • No other colour can enter an occupied node or edge
   • Backtrack by dragging back — releases nodes/edges
   • Lift finger → cancels incomplete line, releases all
   • Complete = reach matching endpoint → line locks permanently

   SHAPES (rotate at each 10% milestone)
   ───────────────────────────────────────
   donut · circle · grid · heart · star · cross · diamond-large

   SCORING
   ────────
   • Level worth = pairs × 10 × multiplier (counted at completion)
   • Hard reset: −40% level worth from score, −40% multiplier
   • Multiplier +1% per pair, never below 1.0×
   • 10% milestone: +1 Safe Clear (max 5), shape rotates next level
   • 50% milestone: +1 Safe Reset (max 2)
══════════════════════════════════════════════════════════════ */

// \u2500\u2500 RNG \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function makeRng(seed) {
  let s = (seed ^ 0x9e3779b9) >>> 0;
  return () => { s^=s<<13; s^=s>>>17; s^=s<<5; return (s>>>0)/4294967296; };
}

// \u2500\u2500 GRAPH BUILDERS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// ── GRAPH BUILDER ─────────────────────────────────────────────
function buildAdj(nodes, edges) {
  const adj = {};
  nodes.forEach(n => adj[n.id] = []);
  edges.forEach(e => {
    adj[e.a].push({ node:e.b, edge:e.id });
    adj[e.b].push({ node:e.a, edge:e.id });
  });
  return adj;
}

// ── SHAPE PICKER ───────────────────────────────────────────────
// Never picks the same shape twice in a row.
function pickShape(currentIdx) {
  const n = SHAPES.length;
  if (n <= 1) return 0;
  let next = Math.floor(Math.random() * (n - 1));
  if (next >= currentIdx) next++;
  return next;
}

// ── BFS SHORTEST PATH ──────────────────────────────────────────
// Finds shortest path from start to end, avoiding occupied nodes/edges.
// Endpoints themselves are allowed even if occupied (they are the pair's own nodes).
function bfsPath(startId, endId, adj, occNodes, occEdges) {
  if (occNodes.has(startId) || occNodes.has(endId)) return null;
  const visited = new Set([startId]);
  const queue   = [{ id:startId, path:[startId] }];
  while (queue.length) {
    const { id, path } = queue.shift();
    if (id === endId) return path;
    for (const { node, edge } of (adj[id]||[])) {
      if (visited.has(node)) continue;
      if (occEdges.has(edge)) continue;
      if (occNodes.has(node) && node !== endId) continue;
      visited.add(node);
      queue.push({ id:node, path:[...path, node] });
    }
  }
  return null;
}

// ── LEVEL GENERATION ───────────────────────────────────────────
// Strategy per pair (sequential):
//   1. Pick A biased far from all existing endpoints.
//   2. Pick B farthest from A (top 25%) that isn't an existing endpoint.
//   3. BFS A→B avoiding reserved nodes (interior nodes of prior paths)
//      AND all existing endpoints.
//   4. If a path is found, reserve its interior nodes so future pairs
//      must route around it. Endpoints A and B are NOT reserved as
//      blocked — they're dots the player must connect.
//   5. If no path found after PER_PAIR_TRIES, reduce pair count by 1.
//
// Player rules mirror this: locked paths block movement; other colors'
// dots block passage; only your own two dots are your start/end.
function generateLevel(graph, numPairs, seed) {
  const { nodes, adj } = graph;
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  const ids = nodes.map(n => n.id);

  const MIN_END_DIST   = 0.22;  // min Euclidean distance between a pair's two dots
  const MIN_SEP        = 0.12;  // min distance between any two endpoints
  const PER_PAIR_TRIES = 150;
  const RESTARTS       = 25;

  for (let restart = 0; restart < RESTARTS; restart++) {
    const rng = makeRng(seed + restart * 6271);

    // reserved: interior nodes of committed paths (player must route around them)
    // endpoints: the actual dots placed so far (block A/B selection and BFS)
    const reserved  = new Set();  // interior path nodes
    const endpoints = new Set();  // all A and B dots placed
    const pairs     = [];
    let   ok        = true;

    for (let i = 0; i < numPairs; i++) {
      let placed = false;

      for (let att = 0; att < PER_PAIR_TRIES; att++) {
        // ── Pick A: not reserved or an endpoint ────────────────
        const freeA = ids.filter(id => !reserved.has(id) && !endpoints.has(id));
        if (freeA.length < 4) break;

        let a;
        if (endpoints.size === 0) {
          a = freeA[Math.floor(rng() * freeA.length)];
        } else {
          const scored = freeA.map(id => {
            const n = nodeMap[id];
            const minD = Math.min(...[...endpoints].map(eid =>
              Math.hypot(n.x - nodeMap[eid].x, n.y - nodeMap[eid].y)
            ));
            return { id, minD };
          }).sort((x, y) => y.minD - x.minD);
          const topA = Math.max(1, Math.ceil(scored.length * 0.30));
          a = scored[Math.floor(rng() * topA)].id;
        }
        const na = nodeMap[a];
        // Reject if too close to any existing endpoint
        if ([...endpoints].some(eid =>
          Math.hypot(na.x - nodeMap[eid].x, na.y - nodeMap[eid].y) < MIN_SEP
        )) continue;

        // ── Pick B: not reserved/endpoint, far from A ──────────
        const candB = ids.filter(id => {
          if (id === a || reserved.has(id) || endpoints.has(id)) return false;
          const nb = nodeMap[id];
          if (Math.hypot(na.x - nb.x, na.y - nb.y) < MIN_END_DIST) return false;
          return ![...endpoints].some(eid =>
            Math.hypot(nb.x - nodeMap[eid].x, nb.y - nodeMap[eid].y) < MIN_SEP
          );
        });
        if (candB.length === 0) continue;

        candB.sort((x, y) => {
          const nx = nodeMap[x], ny = nodeMap[y];
          return Math.hypot(ny.x - na.x, ny.y - na.y)
               - Math.hypot(nx.x - na.x, nx.y - na.y);
        });
        const topB = Math.max(1, Math.ceil(candB.length * 0.25));
        const b = candB[Math.floor(rng() * topB)];

        // ── BFS: A→B avoiding reserved interior nodes AND all endpoints ──
        // Endpoints act as walls in BFS so paths don't cut through other dots.
        const bfsWalls = new Set([...reserved, ...endpoints]);
        const path = bfsPath(a, b, adj, bfsWalls, new Set());
        if (!path || path.length < 2) continue;

        // ── Commit: reserve interior nodes, register endpoints ──
        path.slice(1, -1).forEach(nid => reserved.add(nid));
        endpoints.add(a);
        endpoints.add(b);
        pairs.push({ a, b, color: COLOR_KEYS[i] });
        placed = true;
        break;
      }

      if (!placed) { ok = false; break; }
    }

    if (ok && pairs.length === numPairs) {
      // Final validation: every pair can still reach its partner
      // when all OTHER pairs' endpoints are walls (mirrors player experience)
      const allEnds = new Set(pairs.flatMap(p => [p.a, p.b]));
      const valid = pairs.every(p => {
        const walls = new Set([...allEnds].filter(id => id !== p.a && id !== p.b));
        return !!bfsPath(p.a, p.b, adj, walls, new Set());
      });
      if (valid) return { pairs, graph };
    }
  }
  return null;
}

const MIN_PAIRS = 3;
function generateWithRetry(graph, pairsBase, seed) {
  for (let target = pairsBase; target >= MIN_PAIRS; target--) {
    for (let t = 0; t < 6; t++) {
      const r = generateLevel(graph, target, seed + t * 3571);
      if (r) return { ...r, pairsBase };
    }
  }
  for (let t = 0; t < 10; t++) {
    const r = generateLevel(graph, 2, seed + t * 999);
    if (r) return { ...r, pairsBase };
  }
  return null;
}

// ── COORDINATE HELPERS ─────────────────────────────────────────
function nToC([x,y], W, H) {
  const px=W*0.04, py=H*0.04;
  return { x:px+x*(W-px*2), y:py+y*(H-py*2) };
}

// ── EDGE DRAWING ───────────────────────────────────────────────
function strokeEdge(ctx, na, nb, edgeType, W, H, color, alpha, lw) {
  const pa = nToC([na.x,na.y], W, H);
  const pb = nToC([nb.x,nb.y], W, H);
  ctx.save();
  ctx.globalAlpha = alpha ?? 1;
  ctx.lineWidth   = lw ?? 1.2;
  ctx.lineCap     = "round";

  if (color) {
    const c = PAL[color];
    ctx.shadowColor = c.fill; ctx.shadowBlur = 10;
    ctx.strokeStyle = c.fill;
  } else {
    ctx.strokeStyle = "rgba(255,140,100,0.15)";
    ctx.shadowBlur  = 0;
  }

  if (edgeType==='arc' && na.ring===nb.ring && na.ring!==-1) {
    const cx2=W*0.5, cy2=H*0.5;
    const R  = Math.hypot(pa.x-cx2, pa.y-cy2);
    const a1 = Math.atan2(pa.y-cy2, pa.x-cx2);
    const a2 = Math.atan2(pb.y-cy2, pb.x-cx2);
    let diff = a2-a1;
    if (diff >  Math.PI) diff -= Math.PI*2;
    if (diff < -Math.PI) diff += Math.PI*2;
    ctx.beginPath();
    ctx.arc(cx2, cy2, R, a1, a1+diff, diff<0);
  } else {
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
  }
  ctx.stroke();
  ctx.restore();
}

// ── SPHERE ─────────────────────────────────────────────────────
function drawSphere(ctx, p, color, isDone, dimmed, r) {
  const c = PAL[color];
  ctx.save();
  if (dimmed) {
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=c.dim; ctx.fill(); ctx.restore(); return;
  }
  // Halo
  const halo=ctx.createRadialGradient(p.x,p.y,r*.4,p.x,p.y,r*2.8);
  halo.addColorStop(0,c.fill+(isDone?"55":"1a")); halo.addColorStop(1,"transparent");
  ctx.beginPath(); ctx.arc(p.x,p.y,r*2.8,0,Math.PI*2); ctx.fillStyle=halo; ctx.fill();
  // Body
  ctx.shadowColor=c.fill; ctx.shadowBlur=isDone?26:12;
  const sg=ctx.createRadialGradient(p.x-r*.3,p.y-r*.33,r*.05,p.x,p.y,r);
  sg.addColorStop(0,"rgba(255,255,255,.95)"); sg.addColorStop(0.14,c.fill+"ee");
  sg.addColorStop(0.65,c.fill); sg.addColorStop(1,c.dark);
  ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
  // Rim
  ctx.shadowBlur=0;
  ctx.strokeStyle=isDone?"rgba(255,255,255,.8)":c.fill+"66";
  ctx.lineWidth=isDone?2.2:1; ctx.globalAlpha=isDone?1:.65; ctx.stroke();
  // Specular
  ctx.globalAlpha=.76;
  ctx.beginPath(); ctx.arc(p.x-r*.28,p.y-r*.3,r*.22,0,Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,.88)"; ctx.fill();
  if (isDone) {
    ctx.globalAlpha=1; ctx.strokeStyle="#fff";
    ctx.lineWidth=r*.2; ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.beginPath();
    ctx.moveTo(p.x-r*.27,p.y); ctx.lineTo(p.x-.04*r,p.y+r*.25); ctx.lineTo(p.x+r*.3,p.y-.21*r);
    ctx.stroke();
  }
  ctx.restore();
}

const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

function getSupabase() {
  if (!SUPABASE_URL.startsWith("http")) return null;
  try {
    const { createClient } = window.supabase ?? {};
    if (!createClient) return null;
    return createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch { return null; }
}

async function loadLeaderboard() {
  const sb = getSupabase();
  if (!sb) return [];
  try {
    const { data, error } = await sb
      .from("scores")
      .select("name,score,levels")
      .order("score", { ascending: false })
      .limit(20);
    if (error) return [];
    return data || [];
  } catch { return []; }
}

async function submitScore(name, score, levels) {
  const sb = getSupabase();
  if (!sb) return false;
  try {
    const { error } = await sb
      .from("scores")
      .insert({ name: (name||"ANONYMOUS").toUpperCase().slice(0,12), score, levels });
    return !error;
  } catch { return false; }
}

  const [playerName, setPlayerName] = useState(()=>{

  });

  // Player drawing state
  // playerPaths: color → { nodeSet: Set<id>, edgeSet: Set<id>, locked: bool }
  const [playerPaths, setPlayerPaths] = useState({});
  const [completed,   setCompleted]   = useState(new Set());
  // active: { color, nodeTrail:[id], edgeTrail:[id], startId, targetId }
  const [active,    setActive]    = useState(null);
  const [shaking,   setShaking]   = useState(false);
  const [milestone, setMilestone] = useState(null);
  const [showNext,  setShowNext]  = useState(false);
  const [levelBonus,setLevelBonus]= useState({pts:0,charge:[]});
  const [dimming,   setDimming]   = useState(false);

  const canvasRef = useRef(null);
  const justCompletedRef = useRef(false);
  const showNextRef = useRef(false);
  const [cW, setCW] = useState(360);
  const [cH, setCH] = useState(630);

  // Stable refs for use in event handlers
  const gsRef     = useRef(gs);     gsRef.current     = gs;
  const pzRef     = useRef(null);
  const activeRef = useRef(null);   activeRef.current = active;
  const ppRef     = useRef({});     ppRef.current     = playerPaths;
  const compRef   = useRef(new Set()); compRef.current = completed;
  showNextRef.current = showNext;

  useEffect(()=>wrSave(gs),[gs]);

  useEffect(()=>{
    if (menuTab==="scores") {
      setLbLoading(true); setLbError(false);
      loadLeaderboard().then(rows=>{
        setLeaderboard(rows);
        setLbLoading(false);
        setLbError(rows.length===0 && !SUPABASE_URL.startsWith("http"));
      });
    }
  },[menuTab]);

  // Recompute canvas dimensions whenever shape changes or window resizes
  useEffect(()=>{
    const shape = SHAPES[gsRef.current.shapeIdx % SHAPES.length];
    const aspect = shape.aspect ?? (8/14);
    const upd=()=>{
      const screenW = window.innerWidth;
      const screenH = window.innerHeight - 190; // space for UI above/below
      // Fill full width, derive height from aspect. Clamp if too tall.
      let w = screenW;
      let h = Math.round(w / aspect);
      if (h > screenH) { h = screenH; w = Math.round(h * aspect); }
      setCW(w);
      setCH(h);
    };
    upd(); window.addEventListener("resize",upd); return()=>window.removeEventListener("resize",upd);
  },[gs.shapeIdx]);

  // ── START LEVEL ──────────────────────────────────────────────
  function startLevel(shapeIdx, numPairs, seed) {
    setLoading(true); setPuzzle(null);
    setPlayerPaths({}); ppRef.current={};
    setCompleted(new Set()); compRef.current=new Set();
    setActive(null); activeRef.current=null;
    setShaking(false); setMilestone(null); setShowNext(false); setDimming(false); setLevelBonus({pts:0,charge:[]});

    setTimeout(()=>{
      const shape = SHAPES[shapeIdx % SHAPES.length];
      const graph = shape.build();
      const pz    = generateWithRetry(graph, numPairs, seed??Date.now()%99999);
      pzRef.current = pz;
      setPuzzle(pz);
      setLoading(false);
    }, 40);
  }

  function beginPlay() {
    const g=gsRef.current;
    startLevel(g.shapeIdx, g.pairsBase, Date.now()%99999);
    setScreen("game");
  }
  function nextLevel() { const g=gsRef.current; startLevel(g.shapeIdx,g.pairsBase,Date.now()%99999); setShowNext(false); }
  function safeClear() {
    if (gsRef.current.safeClearCharges<=0||showNext) return;
    setGs(p=>({...p,safeClearCharges:p.safeClearCharges-1}));
    setPlayerPaths({}); ppRef.current={};
    setCompleted(new Set()); compRef.current=new Set();
    setActive(null); activeRef.current=null;
  }
  function safeReset() {
    const g=gsRef.current;
    if (g.safeResetCharges<=0||showNext) return;
    setGs(p=>({...p,safeResetCharges:p.safeResetCharges-1}));
    startLevel(g.shapeIdx,g.pairsBase,Date.now()%99999);
  }
  function hardReset() {
    if (showNext) return;
    const g=gsRef.current; const pz=pzRef.current;
    const levelWorth = pz ? Math.round((pz.pairsBase??pz.pairs.length)*10*g.multiplier) : 0;
    const newMult    = Math.max(1.0, Math.round((g.multiplier-0.05)*100)/100);
    const scoreLoss  = Math.round(levelWorth*0.5);
    const newShape   = pickShape(g.shapeIdx);
    setGs(p=>({...p, multiplier:newMult, score:Math.max(0,p.score-scoreLoss), totalMistakes:p.totalMistakes+1, shapeIdx:newShape}));
    setShaking(true); setDimming(true);
    setTimeout(()=>setShaking(false),450);
    setTimeout(()=>{ setDimming(false); startLevel(newShape,g.pairsBase,Date.now()%99999); },700);
  }
  function levelComplete() {
    const g=gsRef.current; const pz=pzRef.current; if(!pz)return;
    // Charge bonus: held safe clears +5% each, held safe resets +10% each
    const chargeBonus   = g.safeClearCharges*0.05 + g.safeResetCharges*0.10;
    const effectiveMult = g.multiplier + chargeBonus;
    const scorePairs    = pz.pairsBase ?? pz.pairs.length;
    const levelWorth    = Math.round(scorePairs*10*effectiveMult);
    const newMult       = Math.round((g.multiplier+0.01)*100)/100;
    const newLevels     = g.levelsCompleted+1;
    // Milestone every 10 levels → +1 safe clear charge (cap 5)
    const prevMile  = Math.floor(g.levelsCompleted/10);
    const newMile   = Math.floor(newLevels/10);
    const crossed   = newMile-prevMile;
    const newClear  = Math.min(5, g.safeClearCharges+(crossed>0?1:0));
    // +1 safe reset every 50 levels (cap 2)
    const prevFifty = Math.floor(g.levelsCompleted/50);
    const newFifty  = Math.floor(newLevels/50);
    const newReset  = Math.min(2, g.safeResetCharges+(newFifty-prevFifty));
    // +1 pair every 5 levels (cap at COLOR_KEYS.length)
    const prev5     = Math.floor(g.levelsCompleted/5);
    const new5      = Math.floor(newLevels/5);
    const gained5   = new5-prev5;
    const newPairs  = Math.min(COLOR_KEYS.length, g.pairsBase+gained5);
    // Random new shape every 5 levels too
    const newShapeIdx = (gained5>0) ? pickShape(g.shapeIdx) : g.shapeIdx;
    const newScore  = g.score+levelWorth;
    // Build bonus lines for the complete overlay (shown inline, not as popup)
    const bonusLines = [];
    if (chargeBonus>0) bonusLines.push(`+${Math.round(chargeBonus*100)}% CHARGE BONUS`);
    if (gained5>0 && newPairs>g.pairsBase) bonusLines.push(`+${newPairs-g.pairsBase} PAIR${newPairs-g.pairsBase>1?'S':''} UNLOCKED`);
    if (crossed>0) bonusLines.push(`${newMile*10} LEVEL MILESTONE`);
    setLevelBonus({pts:levelWorth, charge:bonusLines});
    setGs(p=>({...p, multiplier:newMult, score:newScore, highScore:Math.max(p.highScore,newScore),
      levelsCompleted:newLevels, totalPairs:p.totalPairs+pz.pairs.length,
      safeClearCharges:newClear, safeResetCharges:newReset, pairsBase:newPairs, shapeIdx:newShapeIdx}));
    setShowNext(true);
    // Auto-submit score after every level — fire and forget
    const submitName = (()=>{ try { return localStorage.getItem("cp_name")||"ANONYMOUS"; } catch { return "ANONYMOUS"; } })();
    submitScore(submitName||"ANONYMOUS", newScore, newLevels);
  }

  // ── CANVAS RENDER ────────────────────────────────────────────
  useEffect(()=>{
    const canvas=canvasRef.current;
    if (!canvas||screen!=="game"||!puzzle||loading) return;
    const ctx=canvas.getContext("2d");
    const W=cW, H=cH;
    ctx.clearRect(0,0,W,H);

    const { pairs, graph } = puzzle;
    const { nodes, edges } = graph;
    const nodeMap={};
    nodes.forEach(n=>nodeMap[n.id]=n);

    // Background
    const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,H*.55);
    bg.addColorStop(0,"#090012"); bg.addColorStop(1,"#000003");
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // All graph edges — faint skeleton
    edges.forEach(e=>{
      const na=nodeMap[e.a], nb=nodeMap[e.b];
      if (!na||!nb) return;
      strokeEdge(ctx, na, nb, e.type, W, H, null, 1, 1.0);
    });

    // Committed locked player paths
    Object.entries(playerPaths).forEach(([color,pp])=>{
      if (!pp.locked) return;
      pp.edgeSet.forEach(eid=>{
        const e=edges.find(ed=>ed.id===eid); if(!e)return;
        strokeEdge(ctx,nodeMap[e.a],nodeMap[e.b],e.type,W,H,color,1,5);
      });
    });

    // Active in-progress path
    const act=activeRef.current;
    if (act?.edgeTrail?.length>0) {
      act.edgeTrail.forEach(eid=>{
        const e=edges.find(ed=>ed.id===eid); if(!e)return;
        strokeEdge(ctx,nodeMap[e.a],nodeMap[e.b],e.type,W,H,act.color,0.72,5);
      });
    }

    // Graph intersection nodes (non-endpoint)
    const endIds=new Set(pairs.flatMap(p=>[p.a,p.b]));
    nodes.forEach(n=>{
      if (endIds.has(n.id)) return;
      const pos=nToC([n.x,n.y],W,H);
      ctx.save();
      ctx.beginPath(); ctx.arc(pos.x,pos.y,2,0,Math.PI*2);
      ctx.fillStyle="rgba(255,140,100,0.2)"; ctx.fill();
      ctx.restore();
    });

    // Endpoint spheres
    const sr=Math.max(8,W*0.032);
    pairs.forEach(pair=>{
      [pair.a,pair.b].forEach(nid=>{
        const n=nodeMap[nid]; if(!n)return;
        const pos=nToC([n.x,n.y],W,H);
        drawSphere(ctx,pos,pair.color,completed.has(pair.color),dimming,sr);
      });
    });

  },[screen,puzzle,loading,playerPaths,active,completed,dimming,cW,cH]);

  // ── INPUT HELPERS ─────────────────────────────────────────────
  function evtXY(e) {
    const rect=canvasRef.current?.getBoundingClientRect();
    if (!rect) return {x:0,y:0};
    const s=e.touches?.[0]??e;
    return {x:s.clientX-rect.left, y:s.clientY-rect.top};
  }

  // Find the nearest endpoint sphere within snap radius
  function nearestEndpoint(px,py) {
    const pz=pzRef.current; if(!pz)return null;
    const R=Math.max(18,cW*.06);
    let best=null,bd=R;
    for (const pair of pz.pairs) {
      for (const nid of [pair.a,pair.b]) {
        const n=pz.graph.nodes.find(n=>n.id===nid); if(!n)continue;
        const pos=nToC([n.x,n.y],cW,cH);
        const d=Math.hypot(px-pos.x,py-pos.y);
        if (d<bd) { bd=d; best={pair,nid}; }
      }
    }
    return best;
  }

  // Find nearest node among a given id list within snap radius
  function nearestAmong(px,py,ids) {
    const pz=pzRef.current; if(!pz)return null;
    const R=Math.max(15,cW*.05);
    let best=null,bd=R;
    for (const nid of ids) {
      const n=pz.graph.nodes.find(n=>n.id===nid); if(!n)continue;
      const pos=nToC([n.x,n.y],cW,cH);
      const d=Math.hypot(px-pos.x,py-pos.y);
      if (d<bd) { bd=d; best=nid; }
    }
    return best;
  }

  // All nodes/edges occupied by OTHER locked colours.
  // Endpoints of unlocked colours are NOT blocked — the player must be able
  // to route through the graph freely; only completed lines are walls.
  function getOccupiedByOthers(myColor) {
    const occ={nodes:new Set(),edges:new Set()};
    Object.entries(ppRef.current).forEach(([col,pp])=>{
      if (col===myColor||!pp.locked) return;
      pp.nodeSet.forEach(n=>occ.nodes.add(n));
      pp.edgeSet.forEach(e=>occ.edges.add(e));
    });
    return occ;
  }

  // ── POINTER DOWN — start drawing ──────────────────────────────
  const onDown = useCallback(e=>{
    e.preventDefault();
    if (showNextRef.current) return;
    const {x,y}=evtXY(e);
    const hit=nearestEndpoint(x,y); if(!hit)return;
    const {pair,nid}=hit;
    const targetId=pair.a===nid?pair.b:pair.a;

    // Don't allow re-drawing a locked color — once connected, stay connected
    const pp=ppRef.current[pair.color];
    if (pp&&pp.locked) return;

    const act={color:pair.color,nodeTrail:[nid],edgeTrail:[],startId:nid,targetId};
    setActive(act); activeRef.current=act;
  },[cW,cH]);

  // ── POINTER MOVE — extend/backtrack drawing ───────────────────
  const onMove = useCallback(e=>{
    e.preventDefault();
    const act=activeRef.current; if(!act)return;
    const {x,y}=evtXY(e);
    const pz=pzRef.current; if(!pz)return;
    const {adj}=pz.graph;

    const curId=act.nodeTrail[act.nodeTrail.length-1];
    // Only consider nodes adjacent to current node
    const adjIds=adj[curId].map(a=>a.node);
    const nextId=nearestAmong(x,y,adjIds);
    if (nextId==null||nextId===curId) return;

    // ── BACKTRACK: dragged back to previous node ──────────────
    const prevIdx=act.nodeTrail.indexOf(nextId);
    if (prevIdx>=0) {
      if (prevIdx===act.nodeTrail.length-2) {
        // One step back — release last node and edge
        const newNodeTrail=act.nodeTrail.slice(0,-1);
        const newEdgeTrail=act.edgeTrail.slice(0,-1);
        const updated={...act,nodeTrail:newNodeTrail,edgeTrail:newEdgeTrail};
        setActive(updated); activeRef.current=updated;
      }
      return; // deeper revisit = ignore
    }

    // ── FORWARD: move to new node ─────────────────────────────
    const conn=adj[curId].find(a=>a.node===nextId); if(!conn)return;

    // Block: nodes/edges used by other locked colour paths
    const occ=getOccupiedByOthers(act.color);
    if (occ.edges.has(conn.edge)) return;
    if (occ.nodes.has(nextId) && nextId!==act.targetId) return;

    // Block: endpoints belonging to OTHER colours (can't route through another dot)
    if (pz && nextId!==act.targetId && nextId!==act.startId) {
      const isOtherEndpoint = pz.pairs.some(p=>
        p.color!==act.color && (p.a===nextId||p.b===nextId)
      );
      if (isOtherEndpoint) return;
    }

    const newNodeTrail=[...act.nodeTrail,nextId];
    const newEdgeTrail=[...act.edgeTrail,conn.edge];

    // ── COMPLETE: reached the target endpoint ─────────────────
    if (nextId===act.targetId) {
      const nodeSet=new Set(newNodeTrail);
      const edgeSet=new Set(newEdgeTrail);
      const locked={nodeSet,edgeSet,locked:true};

      // Commit to state
      justCompletedRef.current=true;
      const newPP={...ppRef.current,[act.color]:locked};
      ppRef.current=newPP;
      setPlayerPaths(newPP);
      setActive(null); activeRef.current=null;

      const newComp=new Set([...compRef.current,act.color]);
      compRef.current=newComp;
      setCompleted(newComp);

      const pz2=pzRef.current;
      if (pz2 && newComp.size===pz2.pairs.length) levelComplete();
      return;
    }

    const updated={...act,nodeTrail:newNodeTrail,edgeTrail:newEdgeTrail};
    setActive(updated); activeRef.current=updated;
  },[cW,cH]);

  // ── POINTER UP — cancel incomplete line ───────────────────────
  const onUp = useCallback(e=>{
    e.preventDefault();
    if (justCompletedRef.current) { justCompletedRef.current=false; return; }
    setActive(null); activeRef.current=null;
  },[]);

  // ── DERIVED UI STATE ──────────────────────────────────────────
  const multPct    = Math.round((gs.multiplier-1)*100);
  const nextMile   = (Math.floor(multPct/10)+1)*10;
  const barPct     = (multPct%10)*10;
  const pairsTotal = puzzle?.pairs?.length ?? 0;
  const shapeLabel = SHAPES[gs.shapeIdx%SHAPES.length].label;

  // ══ MENU ════════════════════════════════════════════════════
  if (screen==="menu") return (
    <div style={{minHeight:"100vh",background:"#000",display:"flex",flexDirection:"column",alignItems:"center",padding:"22px 16px 36px",overflowY:"auto"}}>
      <style>{CSS}</style>
      <div style={{position:"fixed",top:"-28%",left:"-18%",width:"75vw",height:"75vw",borderRadius:"50%",background:"radial-gradient(circle,rgba(255,140,100,.04),transparent 65%)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:"-22%",right:"-14%",width:"62vw",height:"62vw",borderRadius:"50%",background:"radial-gradient(circle,rgba(187,134,252,.025),transparent 65%)",pointerEvents:"none"}}/>

      <div style={{textAlign:"center",marginBottom:18,animation:"fadeUp .5s ease"}}>
        <div className="RJ" style={{color:"rgba(255,140,100,.16)",fontSize:8,letterSpacing:10,marginBottom:5}}>GIRL PUNK PUZZLE</div>
        <h1 className="TT" style={{fontSize:58,letterSpacing:4,lineHeight:.92,background:"linear-gradient(155deg,#FF8C69,#fff 42%,#FF8C69)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>SPHERE<br/>CONNECT</h1>
        <div style={{width:50,height:1,background:"linear-gradient(90deg,transparent,#FF8C69,transparent)",margin:"9px auto"}}/>
        <div className="RJ" style={{color:"rgba(255,140,100,.14)",fontSize:8,letterSpacing:7}}>trace · connect · conquer</div>
      </div>

      {/* Tab switcher */}
      <div style={{display:"flex",gap:2,marginBottom:16,background:"#060010",borderRadius:5,padding:3,border:"1px solid rgba(255,140,100,.1)"}}>
        {["play","scores"].map(tab=>(
          <button key={tab} onClick={()=>setMenuTab(tab)}
            className="btn" style={{padding:"6px 20px",fontSize:10,letterSpacing:3,
              background:menuTab===tab?"#FF8C69":"transparent",
              color:menuTab===tab?"#000":"rgba(255,140,100,.4)",
              borderRadius:3,transition:"all .2s"}}>
            {tab==="play"?"PLAY":"SCORES"}
          </button>
        ))}
      </div>

      {/* ── SCORES TAB ── */}
      {menuTab==="scores"&&(
        <div style={{width:"100%",maxWidth:320,marginBottom:16,animation:"fadeUp .3s ease"}}>
          <div className="RJ" style={{color:"rgba(255,140,100,.2)",fontSize:7,letterSpacing:5,textAlign:"center",marginBottom:8}}>GLOBAL LEADERBOARD</div>
          {lbLoading?(
            <div style={{display:"flex",justifyContent:"center",gap:6,padding:"20px 0"}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#FF8C69",animation:`pulse .9s ${i*.18}s infinite`}}/>)}
            </div>
          ):!SUPABASE_URL.startsWith("http")?(
            <div className="RJ" style={{color:"rgba(255,140,100,.25)",fontSize:11,textAlign:"center",padding:"16px 0",letterSpacing:2,lineHeight:1.8}}>
              SUPABASE NOT CONFIGURED YET<br/>
              <span style={{fontSize:9,color:"rgba(255,140,100,.15)"}}>SEE SETUP INSTRUCTIONS IN THE FILE</span>
            </div>
          ):leaderboard.length===0?(
            <div className="RJ" style={{color:"rgba(255,140,100,.2)",fontSize:11,textAlign:"center",padding:"20px 0",letterSpacing:2}}>NO SCORES YET — BE FIRST!</div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:3}}>
              {leaderboard.map((entry,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"#060010",border:"1px solid rgba(255,140,100,.08)",borderRadius:4,padding:"7px 10px"}}>
                  <div className="TT" style={{color:i===0?"#FFD700":i===1?"#C0C0C0":i===2?"#CD7F32":"rgba(255,140,100,.3)",fontSize:14,minWidth:22,textAlign:"right"}}>{i+1}</div>
                  <div className="TT" style={{color:"#FF8C69",fontSize:14,flex:1,letterSpacing:2}}>{entry.name}</div>
                  <div className="TT" style={{color:"#fff",fontSize:13}}>{entry.score.toLocaleString()}</div>
                  <div className="RJ" style={{color:"rgba(255,140,100,.3)",fontSize:9,letterSpacing:2,minWidth:48,textAlign:"right"}}>{entry.levels}LVL</div>
                </div>
              ))}
            </div>
          )}
          <button className="btn btn-ghost" style={{marginTop:10,width:"100%",justifyContent:"center",fontSize:9}}
            onClick={()=>{ setLbLoading(true); setLbError(false); loadLeaderboard().then(rows=>{ setLeaderboard(rows); setLbLoading(false); }); }}>
            ↻ REFRESH
          </button>
        </div>
      )}

      {/* ── PLAY TAB ── */}
      {menuTab==="play"&&<>
      {/* Player name field */}
      <div style={{marginBottom:14,textAlign:"center"}}>
        <div className="RJ" style={{color:"rgba(255,140,100,.22)",fontSize:7,letterSpacing:5,marginBottom:5}}>YOUR NAME (FOR LEADERBOARD)</div>
        <input
          className="lb-input"
          placeholder="ANONYMOUS"
          value={playerName}
          maxLength={12}
          onChange={e=>{
            const v=e.target.value.toUpperCase().replace(/[^A-Z0-9 ]/g,"");
            setPlayerName(v);
            try { localStorage.setItem("cp_name", v); } catch {}
          }}
        />
      </div>
      <div style={{background:"#060010",border:"1px solid rgba(255,140,100,.1)",borderRadius:6,padding:"10px 28px",marginBottom:16,textAlign:"center",minWidth:210}}>
        <div className="RJ" style={{color:"rgba(255,140,100,.22)",fontSize:7,letterSpacing:5,marginBottom:1}}>HIGH SCORE</div>
        <div className="TT" style={{fontSize:44,color:"#FF8C69",letterSpacing:2}}>{gs.highScore.toLocaleString()}</div>
        <div style={{display:"flex",gap:20,justifyContent:"center",marginTop:5}}>
          {[{l:"LEVELS",v:gs.levelsCompleted},{l:"BONUS",v:multPct+"%"},{l:"MISTAKES",v:gs.totalMistakes}].map(s=>(
            <div key={s.l} style={{textAlign:"center"}}>
              <div className="RJ" style={{color:"rgba(255,140,100,.16)",fontSize:7,letterSpacing:3}}>{s.l}</div>
              <div className="TT" style={{color:"#666",fontSize:17}}>{s.v}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap",justifyContent:"center"}}>
        {[
          {l:"SAFE CLEAR",v:`${gs.safeClearCharges}/5`,c:"#FF8C69"},
          {l:"SAFE RESET",v:`${gs.safeResetCharges}/2`,c:"#BB86FC"},
          {l:"NEXT PAIRS",v:gs.pairsBase,c:"#FFD93D"},
          {l:"NEXT SHAPE",v:shapeLabel,c:"#4ECDC4"},
        ].map(r=>(
          <div key={r.l} style={{background:"#060010",border:"1px solid #0e0e1a",borderRadius:5,padding:"7px 10px",textAlign:"center",minWidth:62}}>
            <div className="RJ" style={{color:"rgba(255,140,100,.18)",fontSize:6,letterSpacing:3}}>{r.l}</div>
            <div className="TT" style={{color:r.c,fontSize:16}}>{r.v}</div>
          </div>
        ))}
      </div>

      <button className="btn btn-pink" style={{fontSize:18,padding:"13px 46px",marginBottom:10,letterSpacing:5}} onClick={beginPlay}>PLAY</button>
      {confirmReset
        ? <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span className="RJ" style={{color:"rgba(255,140,100,.5)",fontSize:11,letterSpacing:2}}>ARE YOU SURE?</span>
            <button className="btn btn-ghost" style={{borderColor:"rgba(255,60,60,.4)",color:"rgba(255,80,80,.65)"}} onClick={()=>{setGs(blankSave());wrSave(blankSave());setConfirmReset(false);}}>YES</button>
            <button className="btn btn-ghost" onClick={()=>setConfirmReset(false)}>NO</button>
          </div>
        : <button className="btn btn-ghost" onClick={()=>setConfirmReset(true)}>RESET PROGRESS</button>
      }

      <div style={{maxWidth:290,marginTop:18,background:"#040008",border:"1px solid rgba(255,140,100,.07)",borderRadius:6,padding:12}}>
        <div className="RJ" style={{color:"rgba(255,140,100,.18)",fontSize:7,letterSpacing:5,marginBottom:7}}>HOW TO PLAY</div>
        <div className="RJ" style={{color:"#252525",fontSize:12,lineHeight:2}}>
          Drag along the graph to connect matching spheres. Paths <em style={{color:"rgba(255,140,100,.45)"}}>cannot cross or share nodes</em>. Lift your finger to cancel a line with no penalty. Use <em style={{color:"rgba(255,140,100,.45)"}}>Safe Clear</em> to erase all lines, or <em style={{color:"rgba(187,134,252,.45)"}}>Safe Reset</em> for a new layout. <em style={{color:"rgba(255,70,70,.35)"}}>Reset</em> costs score and multiplier.
        </div>
      </div>

      <div style={{display:"flex",gap:6,marginTop:18,opacity:.1}}>
        {Object.values(PAL).map((c,i)=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:c.fill}}/>)}
      </div>
      </>}
    </div>
  );

  // ══ GAME ════════════════════════════════════════════════════
  return (
    <div style={{minHeight:"100vh",background:"#000",display:"flex",flexDirection:"column",alignItems:"center",padding:"7px 0 14px",userSelect:"none",position:"relative",overflowY:"auto",overflowX:"hidden"}}>
      <style>{CSS}</style>



      {/* Top bar */}
      <div style={{width:"100%",maxWidth:cW,display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5,padding:"0 8px"}}>
        <button className="btn btn-ghost" style={{padding:"5px 9px",fontSize:9}} onClick={()=>setScreen("menu")}>← MENU</button>
        <div style={{textAlign:"center"}}>
          <div className="TT" style={{color:"#FF8C69",fontSize:16,letterSpacing:4,lineHeight:1}}>COLOR PATH</div>
          <div className="RJ" style={{color:"rgba(255,140,100,.45)",fontSize:10,letterSpacing:3}}>{puzzle?.graph?.shape?.toUpperCase()||"..."} · {pairsTotal} PAIRS</div>
        </div>
        <div className="TT" style={{color:"#FF8C69",fontSize:22,minWidth:60,textAlign:"right"}}>{gs.score.toLocaleString()}</div>
      </div>

      {/* Multiplier bar */}
      <div style={{width:"100%",maxWidth:cW,marginBottom:5,padding:"0 8px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
          <span className="RJ" style={{color:"rgba(255,140,100,.5)",fontSize:9,letterSpacing:3}}>MULTIPLIER</span>
          <span className="TT" style={{color:"#FF8C69",fontSize:16}}>{gs.multiplier.toFixed(2)}×<span className="RJ" style={{color:"rgba(255,140,100,.4)",fontSize:9,marginLeft:4}}>→{nextMile}%</span></span>
        </div>
        <div style={{height:2,background:"#080010",borderRadius:2,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${barPct}%`,background:"linear-gradient(90deg,#FF8C69,#BB86FC)",transition:"width .5s",borderRadius:2}}/>
        </div>
      </div>

      {/* Pair dot strip */}
      {puzzle&&(
        <div style={{display:"flex",gap:5,marginBottom:6,flexWrap:"wrap",justifyContent:"center"}}>
          {puzzle.pairs.map(pair=>{
            const done=completed.has(pair.color);
            const c=PAL[pair.color];
            return <div key={pair.color} style={{width:10,height:10,borderRadius:"50%",
              background:done?c.fill:c.dim,transition:"all .3s",
              boxShadow:done?`0 0 7px ${c.fill}`:undefined,
              border:`1px solid ${done?c.fill+"44":"#0e0e0e"}`}}/>;
          })}
        </div>
      )}

      {/* Canvas */}
      <div className={shaking?"shake":""} style={{borderRadius:14,overflow:"hidden",
        border:"1px solid #0a0014",boxShadow:"0 0 50px rgba(255,140,100,.04),inset 0 0 40px rgba(0,0,0,.9)",
        width:cW,height:cH,flexShrink:0,position:"relative"}}>

        {loading?(
          <div style={{width:cW,height:cH,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#040008"}}>
            <div className="TT" style={{color:"rgba(255,140,100,.25)",fontSize:12,letterSpacing:5,marginBottom:10}}>GENERATING</div>
            <div style={{display:"flex",gap:7}}>
              {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#FF8C69",animation:`pulse .9s ${i*.18}s infinite`}}/>)}
            </div>
          </div>
        ):(
          <canvas ref={canvasRef} width={cW} height={cH}
            style={{display:"block",touchAction:"none"}}
            onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
            onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
          />
        )}

      </div>

      {/* Completion popup — floats over the canvas edge, no overlay, level stays visible */}
      {showNext&&(
        <div style={{position:"relative",width:"100%",maxWidth:cW,height:0,overflow:"visible",zIndex:10,pointerEvents:"none"}}>
          <div style={{position:"absolute",bottom:8,left:0,right:0,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div className="TT" style={{fontSize:42,color:"#FF8C69",letterSpacing:5,textShadow:"0 0 30px #FF8C6980",animation:"fadeUpOut 2.2s ease forwards"}}>COMPLETE</div>
            <div className="RJ" style={{color:"rgba(255,140,100,.85)",fontSize:13,letterSpacing:4,animation:"fadeUpOut 2.2s .1s ease forwards"}}>+{levelBonus.pts} PTS</div>
            {(levelBonus.charge||[]).map((line,i)=>(
              <div key={i} className="RJ" style={{color:"rgba(255,190,130,.6)",fontSize:10,letterSpacing:3,animation:`fadeUpOut 2.2s ${.18+i*.1}s ease forwards`}}>{line}</div>
            ))}
          </div>
        </div>
      )}

      {/* Controls */}
      <div style={{display:"flex",gap:6,marginTop:7,flexWrap:"wrap",justifyContent:"center"}}>
        <button className={`cbtn${gs.safeClearCharges>0?" on":""}`}
          onClick={safeClear} disabled={gs.safeClearCharges<=0||showNext}>
          CLEAR ×{gs.safeClearCharges}
        </button>
        <button className={`cbtn pu${gs.safeResetCharges>0?" on":""}`}
          onClick={safeReset} disabled={gs.safeResetCharges<=0||showNext}>
          SAFE RESET ×{gs.safeResetCharges}
        </button>
        <button className="cbtn re" onClick={hardReset} disabled={showNext}>RESET ☠</button>
      </div>

      {/* NEXT button — below safe buttons, fades in after popup */}
      {showNext&&(
        <button className="btn btn-pink" style={{marginTop:8,fontSize:14,padding:"10px 36px",letterSpacing:4,animation:"fadeUp .35s .3s ease both"}} onClick={nextLevel}>NEXT →</button>
      )}

      {puzzle&&!showNext&&(
        <div className="RJ" style={{color:"rgba(255,140,100,.35)",fontSize:10,letterSpacing:3,marginTop:5,textAlign:"center"}}>
          {(()=>{
            const cb=gs.safeClearCharges*0.05+gs.safeResetCharges*0.10;
            const em=gs.multiplier+cb;
            const sp=puzzle?.pairsBase??pairsTotal;
            return <>WORTH <span style={{color:"rgba(255,140,100,.7)"}}>{Math.round(sp*10*em)}</span> PTS AT {em.toFixed(2)}×{cb>0&&<span style={{color:"rgba(255,200,80,.25)"}}> (+{Math.round(cb*100)}% CHARGE)</span>}{pairsTotal<sp&&<span style={{color:"rgba(180,180,180,.2)"}}> ({pairsTotal}/{sp} PAIRS)</span>}</>;
          })()}
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
